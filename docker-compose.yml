services:
  finance-tools:
    image: finance-tools:latest
    build: .
    volumes:
      - .:/app # dismisses the need for -v "${PWD}:/app" flag for visualize_indicators.py
      - /app/node_modules
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true

  api-server:
    image: finance-api:latest
    build: .
    command: python -m api.api_server
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - API_SECRET_KEY=your-secret-password-here  # Change this!
      - ALLOWED_ORIGINS=https://stool-webapp.vercel.app,http://localhost:3000,http://localhost:8000 # Change this!
    extra_hosts:
      - "host.docker.internal:host-gateway"

  finance-mcp:
    image: finance-api:latest
    container_name: finance-mcp
    build: .
    command: npx tsx mcp/mcp_server.ts --transport=sse
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
